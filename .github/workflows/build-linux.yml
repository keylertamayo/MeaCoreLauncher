name: Release Linux Installer

on:
  push:
    tags:
      - "bat-*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build .deb (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Gradle (Skip Tests)
        run: ./gradlew build --no-daemon -x test

      - name: Extract Version
        id: vars
        run: |
          VERSION=$(grep 'version=' src/main/resources/version.properties | cut -d'=' -f2 | sed 's/-alpha//' | sed 's/-alfa//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Resize Icons
        run: |
          convert icon.png -resize 48x48   icon-48.png
          convert icon.png -resize 128x128 icon-128.png
          convert icon.png -resize 256x256 icon-256.png
          cp icon-48.png  src/main/resources/
          cp icon-128.png src/main/resources/
          cp icon-256.png src/main/resources/

      - name: Create .deb with jpackage
        run: |
          mkdir -p build/dist
          MAIN_JAR=$(ls build/libs/meacore-launcher-*.jar | head -n 1)
          JAR_NAME=$(basename $MAIN_JAR)
          jpackage --name "MeaCore Launcher" \
            --linux-package-name meacore-launcher \
            --vendor "MeaCore" \
            --app-version ${{ env.VERSION }} \
            --input build/libs \
            --main-jar $JAR_NAME \
            --main-class com.experimento.launcher.Main \
            --type deb \
            --icon icon-256.png \
            --resource-dir src/main/resources \
            --linux-shortcut \
            --linux-app-category Game \
            --dest build/dist

      - name: Inspect .deb contents
        run: dpkg -c build/dist/*.deb | grep desktop

      - name: Patch .desktop file
        run: |
          DEB=$(ls build/dist/*.deb)
          mkdir -p /tmp/debpatch
          dpkg-deb -R $DEB /tmp/debpatch
          # Buscar SOLO el .desktop de la aplicación, ignorando los de legal/runtime
          DESKTOP=$(find /tmp/debpatch/opt -maxdepth 3 -name "*.desktop" | head -n 1)
          echo "Parcheando: $DESKTOP"
          cat > "$DESKTOP" << 'EOF'
          [Desktop Entry]
          Name=MeaCore Launcher
          Comment=Tu plataforma definitiva para inyectar mods de Minecraft
          Exec="/opt/meacore-launcher/bin/MeaCore Launcher"
          Icon=/opt/meacore-launcher/lib/MeaCore_Launcher.png
          Terminal=false
          Type=Application
          Categories=Game
          MimeType=
          StartupWMClass=com.experimento.launcher.LauncherApp
          EOF
          dpkg-deb -b /tmp/debpatch $DEB

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeaCoreLauncher-Linux
          path: build/dist/*.deb

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build/dist/*.deb
          generate_release_notes: true
