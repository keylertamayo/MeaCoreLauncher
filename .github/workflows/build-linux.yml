name: Release Linux Installer

on:
  push:
    tags:
      - "bat-*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build .deb (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Gradle (Skip Tests)
        run: ./gradlew build --no-daemon -x test

      - name: Create .deb with jpackage
        run: |
          mkdir -p build/dist
          MAIN_JAR=$(ls build/libs/meacore-launcher-*.jar | head -n 1)
          JAR_NAME=$(basename $MAIN_JAR)
          echo "Using JAR: $JAR_NAME"
          jpackage --name MeaCoreLauncher \
            --input build/libs \
            --main-jar $JAR_NAME \
            --main-class com.experimento.launcher.Main \
            --type deb \
            --icon icon.png \
            --linux-shortcut \
            --linux-app-category Game \
            --app-version 1.1.2 \
            --vendor MeaCore-Enterprise \
            --dest build/dist

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeaCoreLauncher-Linux
          path: build/dist/*.deb

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build/dist/*.deb
          generate_release_notes: true
