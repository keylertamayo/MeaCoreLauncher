name: Release Windows Installer

on:
  push:
    tags:
      - "bat-*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build .msi (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Gradle (Skip Tests)
        run: ./gradlew build --no-daemon -x test

      - name: Extract Version
        id: vars
        shell: pwsh
        run: |
          $content = Get-Content src/main/resources/version.properties
          $versionStr = ($content | Select-String "version=").ToString().Split("=")[1].Trim()
          $cleanVersion = $versionStr -replace "-alpha", "" -replace "-alfa", ""
          echo "VERSION=$cleanVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create .msi with jpackage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/dist
          $MainJar = Get-ChildItem -Filter "meacore-launcher-*.jar" -Path build/libs | Select-Object -First 1
          $JarName = $MainJar.Name
          Write-Host "Using JAR: $JarName"
          jpackage --name meacorelauncher `
            --input build/libs `
            --main-jar $JarName `
            --main-class com.experimento.launcher.Main `
            --type msi `
            --icon icon.png `
            --win-shortcut --win-menu --win-dir-chooser `
            --app-version ${{ env.VERSION }} `
            --vendor MeaCore-Enterprise `
            --dest build/dist

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeaCoreLauncher-Windows
          path: build/dist/*.msi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build/dist/*.msi
          generate_release_notes: true
