name: Release Windows Installer

on:
  push:
    tags:
      - "bat-*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build .msi (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Gradle (Skip Tests)
        run: ./gradlew build --no-daemon -x test

      - name: Create .msi with jpackage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/dist
          jpackage --name MeaCoreLauncher `
            --input build/libs `
            --main-jar meacore-launcher-1.1.0-alpha.1.jar `
            --main-class com.experimento.launcher.Main `
            --type msi `
            --icon icon.png `
            --win-shortcut --win-menu --win-dir-chooser `
            --app-version 1.1.0 `
            --vendor MeaCore-Enterprise `
            --dest build/dist

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeaCoreLauncher-Windows
          path: build/dist/*.msi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: build/dist/*.msi
          generate_release_notes: true
